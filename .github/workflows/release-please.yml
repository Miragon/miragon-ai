name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
        description: "Dry run (build & verify only — no PR, no release, no publish)"

permissions:
  contents: write # release-please commits + tags; publish checks out the repo
  pull-requests: write # release-please opens/updates the Release PR
  issues: write # release-please manages release labels
  packages: write # publish-to-maven publishes to GitHub Packages
  id-token: write # image provenance/SBOM attestation in publish-to-docker

jobs:
  release-please:
    name: Open or update Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: ${{ inputs.dry_run || false }}
          skip-github-release: ${{ inputs.dry_run || false }}

  gate:
    name: Await release approval
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || inputs.dry_run == true }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Approved
        run: echo "Release approved — proceeding to publish."

  publish-maven:
    name: Publish engine plugins to GitHub Packages
    needs: gate
    uses: ./.github/workflows/publish-to-maven.yml
    secrets: inherit
    with:
      dry_run: ${{ inputs.dry_run == true }}

  publish-docker:
    name: Publish gateway image to Docker Hub
    needs: [release-please, gate]
    uses: ./.github/workflows/publish-to-docker.yml
    secrets: inherit
    with:
      dry_run: ${{ inputs.dry_run == true }}
      version: ${{ needs.release-please.outputs.tag_name }}
