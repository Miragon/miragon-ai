logging:
  level:
    # Simulated delegate failures during seeding are intentional and already
    # announced at WARN by the delegates themselves. Suppress the engine's
    # redundant ERROR re-log so the seed output stays readable.
    org.cibseven.bpm.engine.context: "OFF"

seed:
  # MINIMAL profile — ~80 miraveloLeasing instances for fast local iteration
  # and CI smoke tests. Every edge case (pre-fix blacklist outage,
  # priorityFlag, timer escalation, cargo-term DEAD cap, FAX channel) is hit
  # at least once so the skills can be validated without a long boot.
  profile: minimal
