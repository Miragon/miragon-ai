name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  typescript:
    name: TypeScript (Build + Test + Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

  quality:
    name: Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

      - uses: Miragon/pin-npm-dependencies@v1.1.0

  kotlin:
    name: Kotlin (Build + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-plugins
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: ./gradlew build
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

  cibseven-example:
    name: CIB Seven Example (Build + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/cibseven-example
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: ./gradlew build
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
