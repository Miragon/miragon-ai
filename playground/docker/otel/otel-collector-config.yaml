# Listeners bind dual-stack ("[::]" accepts IPv4 and IPv6) — required on
# Fly.io, where private 6PN traffic arrives over IPv6; unchanged behaviour
# on the local Docker network.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "[::]:4317"
      http:
        endpoint: "[::]:4318"

processors:
  batch:
    send_batch_size: 10000
    timeout: 5s

  # DEPLOY_ENV comes from the runtime environment so the same config works in
  # Compose (docker-local) and on Fly.io (fly-playground).
  attributes/env:
    actions:
      - key: deployment.environment
        value: ${env:DEPLOY_ENV}
        action: upsert

exporters:
  # Process analytics metrics — exposed for Prometheus to scrape. This is the
  # sole export path for the metric-first analytics stack; the engine emits
  # OTEL metrics, the Collector serves them here. Names are normalised to
  # Prometheus convention (dots → underscores, unit + `_total` suffixes).
  prometheus:
    endpoint: "[::]:9464"
    send_timestamps: true

  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "::"
                port: 8888

  pipelines:
    # Process metrics are unsampled (100 % via the history-event stream) and
    # feed Prometheus → Grafana / analytics widgets.
    metrics:
      receivers: [otlp]
      processors: [batch, attributes/env]
      exporters: [prometheus, debug]
