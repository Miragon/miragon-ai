# miraveloLeasing enrichment — local end-to-end demo against WireMock.
#
# Pairs with the cibseven-example seeder: the variables resolved here
# (`customerSegment`, `region`, `channel`) are attached to every
# miraveloLeasing instance the seeder produces, and the WireMock mappings
# under docker/wiremock/mappings/ return canned responses for every value
# the seeder emits (PRIVATE/BUSINESS/STUDENT, EU/US/APAC, ONLINE/BRANCH/FAX).
#
# Activation:
#   1. cd docker && docker compose up -d wiremock
#   2. export ENRICHMENT_CONFIG_PATH=$(pwd)/server/resources/enrichment-examples/miraveloLeasing-local.yaml
#   3. pnpm --filter @miragon-ai/server dev
#
# Verify with: curl http://localhost:8088/crm/customers/by-segment/STUDENT

sources:
  crm:
    baseUrl: http://localhost:8088/crm
    auth:
      mode: none

lookups:
  customer_profile:
    source: crm
    description: Customer segment, tier, industry and SLA hours.
    method: GET
    path: /customers/by-segment/{customerSegment}
    inputSchema:
      customerSegment:
        type: string
        description: One of PRIVATE / BUSINESS / STUDENT
    projection:
      - segment
      - tier
      - industry
      - slaHours
    annotations:
      readOnlyHint: true

  region_profile:
    source: crm
    description: Regional routing, GDPR zone and default timezone.
    method: GET
    path: /regions/{region}
    inputSchema:
      region:
        type: string
        description: One of EU / US / APAC
    projection:
      - region
      - gdprZone
      - timezone
    annotations:
      readOnlyHint: true

  channel_profile:
    source: crm
    description: Channel metadata (support tier, deprecation status).
    method: GET
    path: /channels/{channel}
    inputSchema:
      channel:
        type: string
        description: Intake channel (ONLINE, BRANCH or legacy FAX)
    projection:
      - channel
      - supportTier
      - deprecated
      - deprecationNote
    annotations:
      readOnlyHint: true

enrichment_rules:
  - whenVariable: customerSegment
    resolve:
      - lookup: customer_profile
        with:
          customerSegment: $value
  - whenVariable: region
    resolve:
      - lookup: region_profile
        with:
          region: $value
  - whenVariable: channel
    resolve:
      - lookup: channel_profile
        with:
          channel: $value
