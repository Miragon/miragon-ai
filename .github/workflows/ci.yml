name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

# `.npmrc` interpolates `${GITHUB_TOKEN}` to authenticate the
# `@miragon/mcp-toolkit-*` install against npm.pkg.github.com.
# pnpm reads `.npmrc` on every invocation (including the
# `pnpm config get store-dir` call setup-node makes for the cache
# key), so the token must be present from the very first pnpm
# command in every job.
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  typescript:
    name: TypeScript (Build + Test + Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

  quality:
    name: Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

      - uses: Miragon/pin-npm-dependencies@v1.1.0

  kotlin:
    name: Kotlin (Build + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-plugins
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: ./gradlew build
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - run: ./gradlew test
        if: always()
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
