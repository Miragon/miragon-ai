global:
  scrape_interval: 15s
  evaluation_interval: 15s

# CIB Seven operational alert rules. Prometheus evaluates them and exposes the
# state via the `ALERTS` metric / `/api/v1/alerts`. Wire an Alertmanager under
# `alerting:` to route notifications.
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Process analytics metrics, emitted by the engines and exposed by the
  # Collector's Prometheus exporter.
  - job_name: cibseven-process-metrics
    static_configs:
      - targets: ["otel-collector:9464"]

  # The Collector's own internal telemetry (pipeline throughput, drops, …).
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]
