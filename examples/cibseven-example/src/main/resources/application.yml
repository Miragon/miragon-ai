server:
  port: 8410

camunda.bpm:
  admin-user:
    id: demo
    password: demo
  filter:
    create: All tasks
  history-level: full
  # Disabled: BpmnDeploymentBootstrap deploys v1 and v2 of miraveloLeasing in
  # separate deployments because the auto-deployer rolls all `*.bpmn` resources
  # into a single deployment and Camunda rejects two definitions with the same
  # processDefinitionKey in one deployment.
  auto-deployment-enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:camunda;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  config:
    import:
      - optional:classpath:cibseven-webclient.properties

cibseven:
  webclient:
    services:
      basePath: services/v1
    engineRest:
      url: http://localhost:8410
    authentication:
      jwtSecret: Y2liN2V2ZW4tZXhhbXBsZS1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLWp3dC1zaWduaW5nLXB1cnBvc2VzLWFuZC1uZWVkcy10by1iZS1hdC1sZWFzdC0xNTUtY2hhcnMtbG9uZw==

# Enable CIB Seven Spring Event Bridge
camunda.bpm.eventing:
  execution: true
  task: true
  history: true

# History plugins
camunda7mcp:
  history:
    # OTEL process-metrics emitter — the metric-first analytics path. Emits
    # aggregated counters/histograms from the history-event stream via the OTEL
    # agent; the Collector exports them to Prometheus. No event store required.
    metrics:
      enabled: ${METRICS_ENABLED:true}
      # Engine identifier attached as the `engine_id` metric attribute so
      # Prometheus/analytics can attribute and compare data across engines.
      engine-id: ${ENGINE_ID:default}

logging:
  level:
    root: INFO
    com.camunda7mcp: DEBUG
