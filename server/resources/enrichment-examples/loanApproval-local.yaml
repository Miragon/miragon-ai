# loanApproval enrichment — local end-to-end demo against WireMock.
#
# Pairs with the cibseven-example seeder: the variables resolved here
# (`customerSegment`, `currency`, `channel`) are exactly the ones the seeder
# attaches to each loanApproval instance, and the WireMock mappings under
# docker/wiremock/mappings/ return canned responses for every value the
# seeder produces (PRIVATE/BUSINESS/ENTERPRISE, EUR/USD/GBP, ONLINE/FAX).
#
# Activation:
#   1. cd docker && docker compose up -d wiremock
#   2. export ENRICHMENT_CONFIG_PATH=$(pwd)/server/resources/enrichment-examples/loanApproval-local.yaml
#   3. pnpm --filter @miragon-ai/server dev
#
# Verify with: curl http://localhost:8088/crm/customers/by-segment/ENTERPRISE

sources:
  crm:
    baseUrl: http://localhost:8088/crm
    auth:
      mode: none
  billing:
    baseUrl: http://localhost:8088/billing
    auth:
      mode: none

lookups:
  customer_profile:
    source: crm
    description: Customer segment, tier, industry and SLA hours.
    method: GET
    path: /customers/by-segment/{customerSegment}
    inputSchema:
      customerSegment:
        type: string
        description: One of PRIVATE / BUSINESS / ENTERPRISE
    projection:
      - segment
      - tier
      - industry
      - slaHours
    annotations:
      readOnlyHint: true

  currency_profile:
    source: billing
    description: Billing region, invoicing delay and VAT bracket for a currency.
    method: GET
    path: /currencies/{currency}
    inputSchema:
      currency:
        type: string
        description: ISO-4217 code (EUR / USD / GBP)
    projection:
      - currency
      - region
      - invoicingDelayDays
      - vatBracket
    annotations:
      readOnlyHint: true

  channel_profile:
    source: crm
    description: Channel metadata (support tier, deprecation status).
    method: GET
    path: /channels/{channel}
    inputSchema:
      channel:
        type: string
        description: Intake channel (ONLINE or legacy FAX)
    projection:
      - channel
      - supportTier
      - deprecated
      - deprecationNote
    annotations:
      readOnlyHint: true

enrichment_rules:
  - whenVariable: customerSegment
    resolve:
      - lookup: customer_profile
        with:
          customerSegment: $value
  - whenVariable: currency
    resolve:
      - lookup: currency_profile
        with:
          currency: $value
  - whenVariable: channel
    resolve:
      - lookup: channel_profile
        with:
          channel: $value
