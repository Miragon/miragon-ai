logging:
  level:
    # Simulated delegate failures during seeding are intentional and already
    # announced at WARN by the delegates themselves. Suppress the engine's
    # redundant ERROR re-log so the seed output stays readable.
    org.cibseven.bpm.engine.context: "OFF"

seed:
  instances: 200
  completed-ratio: 0.7
  days-back: 30
  # Instances started earlier than (now - buggy-era-days) belong to the pre-fix
  # era. A subset of them gets `_simulateBlacklistOutage=true`, which makes the
  # asyncBefore `CheckBlacklist` task in the `assessCreditworthiness` sub-
  # process raise an incident. Feeds analytics.cluster.compare with a real
  # before/after gap for the fix-verification skill (UC5).
  buggy-era-days: 15
  buggy-era-failure-rate: 0.15
  # Share of instances routed through the rarely-used FAX channel. Intentionally
  # below minBucketSize for suppressed-bucket demonstration in the code-
  # archaeology skill (UC6).
  fax-channel-rate: 0.01
  # Failure rate applied to instances seeded inside the last 7 days. Reuses the
  # blacklist-outage simulator so the analytics dashboard's default 7d window
  # sees Incidents > 0. Independent from the buggy-era band (15..30 days ago)
  # which still anchors the IMPROVED cluster-compare verdict.
  current-era-failure-rate: 0.04
