logging:
  level:
    # Seeding intentionally triggers two incident eras (pre-fix blacklist outage
    # and rollback-era policy-template render failure) — the delegates log
    # their simulated failures at WARN. Suppress the engine's redundant ERROR
    # re-log so the seed output stays readable.
    org.cibseven.bpm.engine.context: "OFF"

seed:
  # PRESENTATION profile — ~600 miraveloLeasing instances with the full
  # coverage surface for the dev-skills demo recipes.
  #
  # UC2 (change-impact):
  #   - `region` (EU/US/APAC), `bikeModel` (city/cargo/trail/road),
  #     `customerSegment` (PRIVATE/BUSINESS/STUDENT) — categorical
  #     reclassification without producing new BPMN paths.
  #   - `priorityFlag` boolean at ~20 % — boolean reclassification.
  #
  # UC5 IMPROVED:
  #   - Pre-fix era days 15..30 → `_simulateBlacklistOutage=true` on 15 %
  #     of instances → CheckBlacklist raises a job-level incident on
  #     Activity_CheckBlacklist. After the cutoff the failure rate drops to 0.
  #     Anchors the IMPROVED verdict against the buggy-era/fix cutoff.
  #
  # UC5 REGRESSED:
  #   - Narrow rollback band days 7..10 → `_simulatePolicyRenderFailure=true`
  #     on 12 % of instances → SendPolicy raises a job-level incident on
  #     Activity_SendPolicy. Bracketed by stable rates before and after.
  #     Anchors the REGRESSED verdict when the deployment window centers
  #     on that cutoff.
  #
  # UC6 DEAD:
  #   - Cargo bikes are capped at 24 lease months, so
  #     `bikeModel == "cargo" && leaseTermMonths > 24` is structurally
  #     unreachable regardless of how many instances we seed.
  #
  # UC6 UNKNOWN (suppressed buckets, below minBucketSize=10):
  #   - FAX channel at ~1 %.
  #   - Timer-boundary escalation at ~10 % of risk-identified instances →
  #     the non-interrupting 2 h timer on Activity_DecideOnApplication fires
  #     and spawns the "Accelerate decision making" branch
  #     (Event_DecisionAccelerated).
  profile: presentation
