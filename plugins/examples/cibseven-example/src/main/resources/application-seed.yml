seed:
  instances: 200
  completed-ratio: 0.7
  days-back: 30
  # Instances started earlier than (now - buggy-era-days) belong to the pre-fix
  # era. A subset of them gets `_simulateDelegateFailure=true`, which causes
  # NotifyApplicantDelegate to throw. This feeds analytics.cluster.compare with
  # a real before/after gap for the fix-verification skill (UC5).
  buggy-era-days: 15
  buggy-era-failure-rate: 0.15
  # Share of instances routed through the rarely-used FAX channel. Intentionally
  # below minBucketSize for suppressed-bucket demonstration in the code-
  # archaeology skill (UC6).
  fax-channel-rate: 0.01
