name: Engine Plugins Publish

# Maven publishing of the Kotlin engine plugins is decoupled from the npm
# release flow: push a tag like `engine-plugins-v0.1.0` (matching `version`
# in engine-plugins/gradle.properties) to publish both shadow jars to the
# GitHub Packages Maven registry of this repository.
on:
  push:
    tags:
      - "engine-plugins-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages Maven
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-plugins
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Verify tag matches gradle.properties version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#engine-plugins-v}"
          GRADLE_VERSION="$(grep '^version=' gradle.properties | cut -d= -f2)"
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match gradle.properties version ($GRADLE_VERSION)" >&2
            exit 1
          fi

      - run: ./gradlew publish
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
