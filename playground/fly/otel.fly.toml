# OTEL Collector — receives OTLP metrics from the engine, serves them for
# Prometheus on :9464. Private-only (no public IP) and always-on: the engine
# pushes and Prometheus scrapes continuously.
# Build context: playground/docker/otel (config baked in via Dockerfile.fly).
app = "miragon-ai-playground-otel"
primary_region = "fra"

[build]
  # Resolved relative to this fly.toml (flyctl rule); the build context
  # stays the working directory deploy.sh cd's into.
  dockerfile = "../docker/otel/Dockerfile.fly"

[env]
  DEPLOY_ENV = "fly-playground"

[checks.otlp_http]
  type = "tcp"
  port = 4318
  interval = "15s"
  timeout = "5s"
  grace_period = "15s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
