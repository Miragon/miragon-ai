# Example enrichment configuration matching the seeded variables.
#
# This file is not loaded by CIB Seven itself — it is consumed by the
# enrichment-mcp server (point ENRICHMENT_CONFIG at it) so that the Dev Skills
# can resolve seeded variables into fachliche Segment-Beschreibungen.
#
# Variables covered (all emitted by MiraveloLeasingSeeder on every instance):
#   - customerSegment  → PRIVATE / BUSINESS / STUDENT
#   - region           → EU / US / APAC
#   - channel          → ONLINE / BRANCH / FAX
#   - priorityFlag     → boolean (resolved via /priorities/{priority})
#
# Everything here is synthetic — no real external API is contacted. The
# sources reference a static-stub mode used by the example runtime.

sources:
  crm_stub:
    baseUrl: stub://crm
    auth:
      mode: none

lookups:
  customer_profile:
    source: crm_stub
    description: Customer segment, tier and industry (static stub).
    method: GET
    path: /customers/by-segment/{customerSegment}
    inputSchema:
      customerSegment:
        type: string
    projection:
      - segment
      - tier
      - industry

  channel_profile:
    source: crm_stub
    description: Channel metadata (online / branch / legacy fax routing).
    method: GET
    path: /channels/{channel}
    inputSchema:
      channel:
        type: string
    projection:
      - channel
      - supportTier
      - deprecated

  region_profile:
    source: crm_stub
    description: Regional routing and compliance zone (static stub).
    method: GET
    path: /regions/{region}
    inputSchema:
      region:
        type: string
    projection:
      - region
      - gdprZone
      - timezone

  priority_profile:
    source: crm_stub
    description: Priority tier and SLA policy (static stub).
    method: GET
    path: /priorities/{priority}
    inputSchema:
      priority:
        type: string
    projection:
      - priority
      - slaHours
      - escalationPolicy

enrichment_rules:
  - whenVariable: customerSegment
    resolve:
      - lookup: customer_profile
        with:
          customerSegment: $value
  - whenVariable: channel
    resolve:
      - lookup: channel_profile
        with:
          channel: $value
  - whenVariable: region
    resolve:
      - lookup: region_profile
        with:
          region: $value
  - whenVariable: priorityFlag
    resolve:
      - lookup: priority_profile
        with:
          priority: $value
