# Phase 1 detekt configuration — permissive, warn-not-error.
# buildUponDefaultConfig = true in the Gradle config means missing keys
# fall through to detekt's bundled defaults.

complexity:
  LongMethod:
    active: true
    threshold: 100
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 10
  CyclomaticComplexMethod:
    active: true
    threshold: 25
  TooManyFunctions:
    active: false
  NestedBlockDepth:
    active: true
    threshold: 6

style:
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 5
  MaxLineLength:
    active: true
    maxLineLength: 140
  ForbiddenComment:
    active: false
  UnusedPrivateMember:
    active: true
  WildcardImport:
    active: true

naming:
  FunctionNaming:
    active: true
  ClassNaming:
    active: true

exceptions:
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: true
