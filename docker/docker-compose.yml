name: miragon-ai

services:
  # Default: custom-built CIB Seven with the OTEL metrics plugin.
  # Identifies itself as `prod-a` via the `engine_id` metric attribute.
  cibseven:
    build:
      context: ../examples/cibseven-example
      dockerfile: Dockerfile
    ports:
      - "8410:8410"
    environment:
      - SPRING_PROFILES_ACTIVE=seed-presentation
      - METRICS_ENABLED=true
      - ENGINE_ID=prod-a
      - OTEL_SERVICE_NAME=cibseven-engine-a
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_METRIC_EXPORT_INTERVAL=15000
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8410/engine-rest/engine || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Second engine on port 8411, identifying as `prod-b`. Opt-in via the
  # `multi-engine` profile so the default `docker compose up` keeps the existing
  # single-engine setup unchanged.
  # Use: docker compose --profile multi-engine up -d
  cibseven-b:
    profiles: [multi-engine]
    build:
      context: ../examples/cibseven-example
      dockerfile: Dockerfile
    ports:
      - "8411:8410"
    environment:
      - SPRING_PROFILES_ACTIVE=seed-presentation
      - METRICS_ENABLED=true
      - ENGINE_ID=prod-b
      - OTEL_SERVICE_NAME=cibseven-engine-b
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_METRIC_EXPORT_INTERVAL=15000
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8410/engine-rest/engine || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Dev: plain CIB Seven image, no custom build
  # Use: docker compose --profile dev up
  cibseven-dev:
    profiles: [dev]
    image: cibseven/cibseven:run-latest
    ports:
      - "8410:8080"
    environment:
      - CIBSEVEN_BPM_RUN_AUTH_ENABLED=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/engine-rest/engine || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # OpenTelemetry Collector — receives OTLP from the engines, serves process
  # metrics for Prometheus to scrape (:9464) and forwards sampled traces to
  # Jaeger. Sole export path of the metric-first analytics stack.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "8430:4317" # OTLP gRPC
      - "8431:4318" # OTLP HTTP
      - "8450:8888" # Collector's own telemetry
      - "8451:9464" # Prometheus exporter (process metrics)

  # Prometheus — scrapes the Collector's process metrics.
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "8460:9090" # Prometheus UI
    depends_on:
      - otel-collector

  # Grafana — process-analytics dashboards over Prometheus. Anonymous admin so
  # the demo opens straight onto the provisioned dashboards.
  grafana:
    image: grafana/grafana:11.4.0
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_DEFAULT_THEME=light
    ports:
      - "8470:3000" # Grafana UI
    depends_on:
      - prometheus

  # Automation MCP server (Node). Opt-in via the `full` profile so the
  # default `docker compose up` brings up infra only — leaving port 8400
  # free for a locally-run gateway (`pnpm -F @miragon-ai/mcp-gateway dev`).
  # Use: docker compose --profile full up -d
  mcp-server:
    profiles: [full]
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8400:8400"
    environment:
      - PORT=8400
      # Pass either a single CAMUNDA_BASE_URL (back-compat, single engine) OR
      # CAMUNDA_ENGINES_JSON with a list. Below: single-engine default; for
      # multi-engine override by exporting CAMUNDA_ENGINES_JSON in the host
      # shell before `docker compose up`, or by overriding via a compose
      # override file.
      - CAMUNDA_BASE_URL=http://cibseven:8410/engine-rest
      - CAMUNDA_COCKPIT_URL=http://localhost:8410/webapp
      - CAMUNDA_AUTH_TYPE=basic
      - CAMUNDA_USERNAME=demo
      - CAMUNDA_PASSWORD=demo
      - PROMETHEUS_URL=http://prometheus:9090
    depends_on:
      cibseven:
        condition: service_healthy
      prometheus:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').createConnection(8400,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s

  # Jaeger UI for trace visualization
  jaeger:
    image: jaegertracing/jaeger:2.16.0
    ports:
      - "8440:16686" # Jaeger UI
      - "8432:4317" # OTLP gRPC (internal, used by Collector)
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  prometheus-data:
