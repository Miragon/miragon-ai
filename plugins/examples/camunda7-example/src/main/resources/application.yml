server:
  port: 8080

camunda.bpm:
  admin-user:
    id: demo
    password: demo
  filter:
    create: All tasks
  history-level: full
  authorization:
    enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:camunda;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: sa

# ClickHouse History Plugin
camunda7mcp:
  history:
    clickhouse:
      enabled: ${CLICKHOUSE_ENABLED:false}
      url: jdbc:clickhouse://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_PORT:8123}/${CLICKHOUSE_DATABASE:camunda_history}
      username: ${CLICKHOUSE_USER:camunda}
      password: ${CLICKHOUSE_PASSWORD:camunda123}
      database: ${CLICKHOUSE_DATABASE:camunda_history}
      batch-size: 100
      flush-interval-seconds: 5
      create-schema: false
      exclude-variables: []

logging:
  level:
    root: INFO
    com.camunda7mcp: DEBUG
