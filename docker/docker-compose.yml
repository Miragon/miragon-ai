services:
  # Default: custom-built CIB Seven with ClickHouse + OTEL config
  cibseven:
    build:
      context: ../plugins/examples/cibseven-example
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=seed
      - CLICKHOUSE_ENABLED=true
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=camunda
      - CLICKHOUSE_PASSWORD=camunda123
      - CLICKHOUSE_DATABASE=camunda_history
      - OTEL_SERVICE_NAME=cibseven-engine
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/engine-rest/engine || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Dev: plain CIB Seven image, no custom build
  # Use: docker compose --profile dev up
  cibseven-dev:
    profiles: [dev]
    image: cibseven/cibseven:run-latest
    ports:
      - "8080:8080"
    environment:
      - CIBSEVEN_BPM_RUN_AUTH_ENABLED=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/engine-rest/engine || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql:ro
    environment:
      - CLICKHOUSE_DB=camunda_history
      - CLICKHOUSE_USER=camunda
      - CLICKHOUSE_PASSWORD=camunda123
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user camunda --password camunda123 --query 'SELECT 1' || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # OpenTelemetry Collector
  # Use: docker compose --profile otel up
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8888:8888" # Collector Metrics
    depends_on:
      clickhouse:
        condition: service_healthy

  # WireMock — backs the enrichment-mcp examples with realistic HTTP stubs.
  # Mappings live in ./wiremock/mappings/*.json; the local enrichment YAMLs
  # under server/resources/enrichment-examples/*-local.yaml point at the host
  # port 8088. To activate: set ENRICHMENT_CONFIG_PATH to one of those YAMLs
  # and start the MCP server.
  wiremock:
    image: wiremock/wiremock:3.10.0
    ports:
      - "8088:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    command: ["--disable-banner", "--global-response-templating"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s

  # Automation MCP server (Node). Opt-in because devs usually run it natively
  # via `pnpm -F @miragon-ai/server dev` on port 3010.
  # Use: docker compose --profile mcp up
  mcp-server:
    profiles: [mcp]
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - CAMUNDA_BASE_URL=http://cibseven:8080/engine-rest
      - CAMUNDA_AUTH_TYPE=basic
      - CAMUNDA_USERNAME=demo
      - CAMUNDA_PASSWORD=demo
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USERNAME=camunda
      - CLICKHOUSE_PASSWORD=camunda123
      - CLICKHOUSE_DATABASE=camunda_history
    depends_on:
      cibseven:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').createConnection(3010,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s

  # Jaeger UI for trace visualization
  # Use: docker compose --profile otel up
  jaeger:
    image: jaegertracing/jaeger:2.16.0
    ports:
      - "16686:16686" # Jaeger UI
      - "4319:4317" # OTLP gRPC (internal, used by Collector)
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  clickhouse-data:
