name: Publish to Docker Hub

on:
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        default: false
        description: "Build & verify only — do not push"
      version:
        type: string
        default: ""
        description: "Image version (e.g. release-please tag_name `v1.2.0`); falls back to apps/mcp-gateway/package.json"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
        description: "Build & verify only — do not push"
      version:
        type: string
        default: ""
        description: "Image version; falls back to apps/mcp-gateway/package.json"

permissions:
  contents: read
  packages: read
  id-token: write

env:
  IMAGE: docker.io/miragon/miragon-ai-server

jobs:
  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Resolve version tag
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"   # release-please tag_name is `v1.2.0` → image tag `1.2.0`
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./apps/mcp-gateway/package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved image version: $VERSION"

      - uses: docker/setup-qemu-action@v4.2.0
      - uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to Docker Hub
        if: ${{ inputs.dry_run != true }}
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.DOCKER_MIRAGON_USERNAME }}
          password: ${{ secrets.DOCKER_MIRAGON_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.dry_run != true }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          provenance: ${{ inputs.dry_run != true }}
          sbom: ${{ inputs.dry_run != true }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
