# Fly.io variant of prometheus.yml — identical scrape jobs, but targets are
# Fly private-network (6PN) hostnames instead of Compose service names.
# Prometheus does not interpolate env vars in its config, hence the copy.
# Keep the job names and rule_files in sync with prometheus.yml.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Process analytics metrics, emitted by the engines and exposed by the
  # Collector's Prometheus exporter.
  - job_name: cibseven-process-metrics
    static_configs:
      - targets: ["miragon-ai-playground-otel.internal:9464"]

  # The Collector's own internal telemetry (pipeline throughput, drops, …).
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["miragon-ai-playground-otel.internal:8888"]
