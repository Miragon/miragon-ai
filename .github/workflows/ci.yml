name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (Build + Test + Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout private submodules
        env:
          TOOLKIT_PAT: ${{ secrets.TOOLKIT_PAT }}
        run: |
          git config --global url."https://x-access-token:${TOOLKIT_PAT}@github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - run: pnpm lint
        if: always()

  kotlin:
    name: Kotlin (Build + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: ./gradlew build
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - run: ./gradlew test
        if: always()
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
