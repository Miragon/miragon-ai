name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  packages: write
  pull-requests: write

# `.npmrc` interpolates `${GITHUB_TOKEN}` both to install the private
# `@miragon/mcp-toolkit-*` packages and to authenticate `changeset publish`
# against npm.pkg.github.com, so the token must be present for every
# pnpm/npm invocation in this job.
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: Changesets (Version PR or Publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # changesets compares against the base branch to detect changes
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Create release PR or publish to npm.pkg.github.com
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
