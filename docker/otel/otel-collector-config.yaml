receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 10000
    timeout: 5s

  attributes/env:
    actions:
      - key: deployment.environment
        value: docker-local
        action: upsert

  tail_sampling:
    decision_wait: 10s
    policies:
      - name: errors-always
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: sample-rest
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

exporters:
  # Process analytics metrics — exposed for Prometheus to scrape. This is the
  # sole export path for the metric-first analytics stack; the engine emits
  # OTEL metrics, the Collector serves them here. Names are normalised to
  # Prometheus convention (dots → underscores, unit + `_total` suffixes).
  prometheus:
    endpoint: 0.0.0.0:9464
    send_timestamps: true

  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

  pipelines:
    # Traces are sampled (observability) and live only in Jaeger now.
    traces:
      receivers: [otlp]
      processors: [batch, attributes/env, tail_sampling]
      exporters: [otlp/jaeger, debug]
    # Process metrics are unsampled (100 % via the history-event stream) and
    # feed Prometheus → Grafana / analytics widgets.
    metrics:
      receivers: [otlp]
      processors: [batch, attributes/env]
      exporters: [prometheus, debug]
