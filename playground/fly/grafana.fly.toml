# Grafana — process-analytics dashboards over Prometheus. Private-only: the
# anonymous-admin setup from the Compose stack is only safe because this app
# never gets a public IP. Reach it via:
#   flyctl proxy 8470:3000 -a miragon-ai-playground-grafana  →  http://localhost:8470
# Dashboards are provisioned from the image; no volume, so user-created
# dashboards do not survive a redeploy (playground grade).
# Build context: playground/docker/grafana (provisioning baked in via Dockerfile.fly).
app = "miragon-ai-playground-grafana"
primary_region = "fra"

[build]
  # Resolved relative to this fly.toml (flyctl rule); the build context
  # stays the working directory deploy.sh cd's into.
  dockerfile = "../docker/grafana/Dockerfile.fly"

[env]
  PROMETHEUS_URL = "http://miragon-ai-playground-prometheus.internal:9090"
  GF_AUTH_ANONYMOUS_ENABLED = "true"
  GF_AUTH_ANONYMOUS_ORG_ROLE = "Admin"
  GF_AUTH_DISABLE_LOGIN_FORM = "true"
  GF_USERS_DEFAULT_THEME = "light"

[checks.grafana]
  type = "tcp"
  port = 3000
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
