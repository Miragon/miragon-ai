name: miragon-ai

services:
  # Default: custom-built CIB Seven with ClickHouse + OTEL config.
  # Identifies itself as `prod-a` in the shared ClickHouse history.
  cibseven:
    build:
      context: ../examples/cibseven-example
      dockerfile: Dockerfile
    ports:
      - "8410:8410"
    environment:
      - SPRING_PROFILES_ACTIVE=seed-presentation
      - CLICKHOUSE_ENABLED=true
      - CLICKHOUSE_ENGINE_ID=prod-a
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=camunda
      - CLICKHOUSE_PASSWORD=camunda123
      - CLICKHOUSE_DATABASE=camunda_history
      - OTEL_SERVICE_NAME=cibseven-engine-a
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8410/engine-rest/engine || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Second engine on port 8411, identifying as `prod-b` in the shared
  # ClickHouse. Opt-in via the `multi-engine` profile so the default `docker
  # compose up` keeps the existing single-engine setup unchanged.
  # Use: docker compose --profile multi-engine up -d
  cibseven-b:
    profiles: [multi-engine]
    build:
      context: ../examples/cibseven-example
      dockerfile: Dockerfile
    ports:
      - "8411:8410"
    environment:
      - SPRING_PROFILES_ACTIVE=seed-presentation
      - CLICKHOUSE_ENABLED=true
      - CLICKHOUSE_ENGINE_ID=prod-b
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=camunda
      - CLICKHOUSE_PASSWORD=camunda123
      - CLICKHOUSE_DATABASE=camunda_history
      - OTEL_SERVICE_NAME=cibseven-engine-b
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8410/engine-rest/engine || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Dev: plain CIB Seven image, no custom build
  # Use: docker compose --profile dev up
  cibseven-dev:
    profiles: [dev]
    image: cibseven/cibseven:run-latest
    ports:
      - "8410:8080"
    environment:
      - CIBSEVEN_BPM_RUN_AUTH_ENABLED=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/engine-rest/engine || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    ports:
      - "8420:8123"
      - "8421:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql:ro
    environment:
      - CLICKHOUSE_DB=camunda_history
      - CLICKHOUSE_USER=camunda
      - CLICKHOUSE_PASSWORD=camunda123
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user camunda --password camunda123 --query 'SELECT 1' || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # OpenTelemetry Collector
  # Use: docker compose --profile otel up
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "8430:4317" # OTLP gRPC
      - "8431:4318" # OTLP HTTP
      - "8450:8888" # Collector Metrics
    depends_on:
      clickhouse:
        condition: service_healthy

  # Automation MCP server (Node). Opt-in via the `full` profile so the
  # default `docker compose up` brings up infra only — leaving port 8400
  # free for a locally-run gateway (`pnpm -F @miragon-ai/mcp-gateway dev`).
  # Use: docker compose --profile full up -d
  mcp-server:
    profiles: [full]
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8400:8400"
    environment:
      - PORT=8400
      # Pass either a single CAMUNDA_BASE_URL (back-compat, single engine) OR
      # CAMUNDA_ENGINES_JSON with a list. Below: single-engine default; for
      # multi-engine override by exporting CAMUNDA_ENGINES_JSON in the host
      # shell before `docker compose up`, or by overriding via a compose
      # override file.
      - CAMUNDA_BASE_URL=http://cibseven:8410/engine-rest
      - CAMUNDA_COCKPIT_URL=http://localhost:8410/webapp
      - CAMUNDA_AUTH_TYPE=basic
      - CAMUNDA_USERNAME=demo
      - CAMUNDA_PASSWORD=demo
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USERNAME=camunda
      - CLICKHOUSE_PASSWORD=camunda123
      - CLICKHOUSE_DATABASE=camunda_history
    depends_on:
      cibseven:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').createConnection(8400,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s

  # Jaeger UI for trace visualization
  # Use: docker compose --profile otel up
  jaeger:
    image: jaegertracing/jaeger:2.16.0
    ports:
      - "8440:16686" # Jaeger UI
      - "8432:4317" # OTLP gRPC (internal, used by Collector)
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  clickhouse-data:
