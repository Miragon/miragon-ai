# Example tenant enrichment config — "ACME".
#
# Declares three REST upstreams (salesforce, erp, contracts), five domain
# lookups, and one auto-resolve rule for the `customerId` variable.
#
# All secrets are referenced by env var; the YAML is safe to check in.

sources:
  salesforce:
    baseUrl: https://api.salesforce.example.com/v1
    auth:
      mode: bearer
      tokenEnv: ENRICHMENT_SALESFORCE_TOKEN

  erp:
    baseUrl: https://erp.internal.example.com/api
    auth:
      mode: header
      headerName: X-API-Key
      valueEnv: ENRICHMENT_ERP_KEY

  contracts:
    baseUrl: https://contracts.internal.example.com/api

lookups:
  get_customer:
    source: salesforce
    description: Fetch a customer by id. Returns id, account manager, and segment.
    method: GET
    path: /customers/{customerId}
    inputSchema:
      customerId:
        type: string
        description: Salesforce customer id (15- or 18-char)
    projection:
      - id
      - accountManager
      - segment
    annotations:
      readOnlyHint: true

  search_customers:
    source: salesforce
    description: Search customers by name fragment. Returns at most 20 matches.
    method: GET
    path: /customers
    inputSchema:
      name:
        type: string
        description: Fragment to match against customer name
    annotations:
      readOnlyHint: true

  get_order:
    source: erp
    description: Fetch an ERP order by id.
    method: GET
    path: /orders/{orderId}
    inputSchema:
      orderId:
        type: string
    projection:
      - id
      - status
      - totalCents
      - currency
    annotations:
      readOnlyHint: true

  list_invoices:
    source: erp
    description: List recent invoices for a customer.
    method: GET
    path: /customers/{customerId}/invoices
    inputSchema:
      customerId:
        type: string
    annotations:
      readOnlyHint: true

  get_active_contract:
    source: contracts
    description: Fetch the currently-active contract for a customer.
    method: GET
    path: /contracts/active
    inputSchema:
      customerId:
        type: string
    projection:
      - id
      - tier
      - validUntil
    annotations:
      readOnlyHint: true

enrichment_rules:
  - whenVariable: customerId
    resolve:
      - lookup: get_customer
        with:
          customerId: $value
      - lookup: get_active_contract
        with:
          customerId: $value
