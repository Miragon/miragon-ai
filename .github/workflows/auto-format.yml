name: Auto Format

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: read

# `.npmrc` interpolates `${GITHUB_TOKEN}` to authenticate the
# `@miragon/mcp-toolkit-*` install against npm.pkg.github.com.
# pnpm reads `.npmrc` on every invocation (including the
# `pnpm config get store-dir` call setup-node makes for the cache
# key), so the token must be present from the very first pnpm
# command in every job.
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  auto-format:
    name: Run Formatters & Open PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: ktlintFormat
        working-directory: engine-plugins
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: ./gradlew ktlintFormat

      - name: Check for formatting changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Close stale PR if codebase is already clean
        if: steps.diff.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head chore/auto-format --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh pr close "$EXISTING" --comment "Codebase is already formatted — closing stale PR."
            gh api "repos/${{ github.repository }}/git/refs/heads/chore/auto-format" -X DELETE || true
          fi

      - name: Create verified commit via GraphQL
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD=$(git rev-parse HEAD)
          REPO="${{ github.repository }}"

          ADDITIONS=$(git diff --name-only | while IFS= read -r file; do
            jq -n --arg path "$file" --arg contents "$(base64 -w0 "$file")" \
              '{path: $path, contents: $contents}'
          done | jq -s '.')

          gh api "repos/$REPO/git/refs" \
            --method POST \
            --field ref="refs/heads/chore/auto-format" \
            --field sha="$HEAD" 2>/dev/null \
          || gh api "repos/$REPO/git/refs/heads/chore/auto-format" \
            --method PATCH \
            --field sha="$HEAD" \
            --field force=true

          QUERY='mutation($repo:String!,$branch:String!,$head:GitObjectID!,$additions:[FileAddition!]!){createCommitOnBranch(input:{branch:{repositoryNameWithOwner:$repo,branchName:$branch}message:{headline:"chore(style): apply ktlint + prettier auto-format"}fileChanges:{additions:$additions}expectedHeadOid:$head}){commit{oid}}}'

          jq -n \
            --arg query "$QUERY" \
            --arg repo "$REPO" \
            --arg head "$HEAD" \
            --argjson additions "$ADDITIONS" \
            '{query:$query,variables:{repo:$repo,branch:"chore/auto-format",head:$head,additions:$additions}}' \
          | gh api graphql --input - --jq '.data.createCommitOnBranch.commit.oid'

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head chore/auto-format --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "chore(style): apply ktlint + prettier auto-format" \
              --body "Automated daily formatting pass (ktlint + Prettier)." \
              --head chore/auto-format \
              --base main
          fi
