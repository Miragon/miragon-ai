name: CodeQL

# Scans the TS/JS server code — the primary attack surface. The Kotlin
# engine-plugins are intentionally NOT scanned here: CodeQL's Kotlin support is
# fragile for this Gradle-in-subdir layout (manual build-mode hangs on the
# Kotlin compiler daemon; build-mode `none` fails to extract any source). The
# Kotlin module is small and already covered by Konsist + unit tests + the CI
# Gradle build. Revisit if CodeQL Kotlin extraction stabilises.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
