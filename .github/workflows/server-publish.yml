name: Server Publish

# Container publishing of the MCP gateway is decoupled from the npm release flow:
# push a tag like `server-v0.1.0` (matching `version` in
# apps/mcp-gateway/package.json) to build the root Dockerfile and push the image
# to this repository's GitHub Container Registry (ghcr.io).
on:
  push:
    tags:
      - "server-v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/miragon/miragon-ai-server

jobs:
  publish:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches apps/mcp-gateway/package.json version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#server-v}"
          PKG_VERSION="$(node -p "require('./apps/mcp-gateway/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)" >&2
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The root Dockerfile fetches the private @miragon packages via a BuildKit
      # secret (id=github_token). The automatic GITHUB_TOKEN can read them (same
      # as the CI install), so no extra PAT is needed.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
