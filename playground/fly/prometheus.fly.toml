# Prometheus — scrapes the Collector, feeds the analytics module and Grafana.
# Private-only (no public IP) and always-on; the TSDB persists on a Fly
# volume (auto-created on first deploy, single machine — playground grade).
# Build context: playground/docker/prometheus (config + shared alert rules
# baked in via Dockerfile.fly).
app = "miragon-ai-playground-prometheus"
primary_region = "fra"

[build]
  # Resolved relative to this fly.toml (flyctl rule); the build context
  # stays the working directory deploy.sh cd's into.
  dockerfile = "../docker/prometheus/Dockerfile.fly"

[[mounts]]
  source = "prom_data"
  destination = "/prometheus"
  initial_size = "3gb"

[checks.prom]
  type = "tcp"
  port = 9090
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
